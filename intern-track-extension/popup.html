<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #191919;
            color: #ebebeb;
            margin: 0;
        }
        
        h2 {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-mark {
            background: #ebebeb;
            color: #191919;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }
        
        label {
            font-size: 12px;
            color: #9b9a97;
            display: block;
            margin-bottom: 4px;
        }
        
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            margin-bottom: 12px;
            background: #252525;
            border: 1px solid #3f3f3f;
            border-radius: 6px;
            color: #ebebeb;
            font-size: 13px;
        }
        
        input:focus {
            outline: none;
            border-color: #5b7fff;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #5b7fff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        #status {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            color: #34d399;
        }
    </style>
</head>

<body>
    <h2>
        <div class="logo-mark">i</div> intern.track</h2>

    <div id="app-form">
        <label>Company</label>
        <input type="text" id="company" placeholder="e.g. Google" />

        <label>Role</label>
        <input type="text" id="role" placeholder="e.g. Software Engineer Intern" />

        <button id="save-btn">Save to To Do ✨</button>
        <div id="status"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
