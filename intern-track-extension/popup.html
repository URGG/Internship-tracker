<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #191919;
            color: #ebebeb;
            margin: 0;
        }
        
        h2 {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-mark {
            background: #ebebeb;
            color: #191919;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .logo-mark svg {
            width: 15px;
            height: 15px;
            display: block;
        }
        
        label {
            font-size: 12px;
            color: #9b9a97;
            display: block;
            margin-bottom: 4px;
        }
        
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            margin-bottom: 12px;
            background: #252525;
            border: 1px solid #3f3f3f;
            border-radius: 6px;
            color: #ebebeb;
            font-size: 13px;
        }
        
        input:focus {
            outline: none;
            border-color: #5b7fff;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #5b7fff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        #status {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            color: #34d399;
        }
    </style>
</head>

<body>
    <h2>
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 3.5 19.4 7.75v8.5L12 20.5l-7.4-4.25v-8.5L12 3.5Z"></path>
                <path d="M12 7.15v9.7"></path>
                <path d="M8.15 9.5H12"></path>
                <path d="M12 14.5h3.85"></path>
                <circle cx="12" cy="7.15" r="1" fill="currentColor" stroke="none"></circle>
                <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"></circle>
                <circle cx="12" cy="16.85" r="1" fill="currentColor" stroke="none"></circle>
            </svg>
        </div> intern.track</h2>

    <!-- LOGIN VIEW -->
    <div id="login-view" style="display: none;">
        <label>Username</label>
        <input type="text" id="login-user" />
        <label>Password</label>
        <input type="password" id="login-pass" />
        <button id="login-btn">Log In to Sync</button>
        <div id="login-status" style="font-size: 11px; margin-top: 8px; text-align: center;"></div>
    </div>

    <!-- JOB FORM VIEW -->
    <div id="app-form" style="display: none;">
        <label>Company</label>
        <input type="text" id="company" placeholder="e.g. Google" />

        <label>Role</label>
        <input type="text" id="role" placeholder="e.g. Software Engineer Intern" />

        <label>Description (Auto-scraped)</label>
        <textarea id="description" style="width: 100%; height: 80px; background: #252525; border: 1px solid #3f3f3f; border-radius: 6px; color: #ebebeb; font-size: 11px; padding: 8px; margin-bottom: 12px; resize: none; font-family: inherit;"></textarea>

        <button id="save-btn">Save to To Do ✨</button>
        <div id="status"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
